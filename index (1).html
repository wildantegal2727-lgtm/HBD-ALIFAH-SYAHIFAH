<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A Gift For You 💙</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Georgia', serif;
    background: #0a1628;
    overflow: hidden;
    user-select: none;
  }

  /* ===== CSS VARIABLES ===== */
  :root {
    --blue-dark: #0a1628;
    --blue-mid: #1a3a6b;
    --blue-light: #b8d4f0;
    --blue-pastel: #d6eaff;
    --blue-accent: #4a90d9;
    --white: #ffffff;
    --card-bg: rgba(255,255,255,0.92);
    --glass: rgba(255,255,255,0.15);
    --shadow: 0 20px 60px rgba(0,0,0,0.3);
    --radius: 30px;
    --max-w: 420px;
  }

  /* ===== APP CONTAINER ===== */
  #app {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ===== BOKEH BACKGROUND ===== */
  .bokeh-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, #1a3a6b 0%, #0a1628 50%, #0d1f3c 100%);
    overflow: hidden;
  }
  .bokeh-bg::before, .bokeh-bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.3;
    animation: bokehFloat 8s ease-in-out infinite alternate;
  }
  .bokeh-bg::before {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #4a90d9, transparent);
    top: 10%; left: 10%;
  }
  .bokeh-bg::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #1a6bb5, transparent);
    bottom: 10%; right: 5%;
    animation-delay: -4s;
  }
  .bokeh-dot {
    position: absolute;
    border-radius: 50%;
    filter: blur(20px);
    opacity: 0.2;
    pointer-events: none;
  }
  @keyframes bokehFloat {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px,40px) scale(1.1); }
  }

  /* ===== PAGES ===== */
  .page {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: scale(0.95);
  }
  .page.active {
    opacity: 1;
    pointer-events: all;
    transform: scale(1);
  }
  .page.exit {
    opacity: 0;
    transform: scale(1.05);
  }
  .page-inner {
    width: 100%;
    max-width: var(--max-w);
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== CARD BASE ===== */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.5);
    overflow: hidden;
  }
  .glass-card {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
  }

  /* ===== PAGE 1 - LANDING ===== */
  #page1 {
    cursor: pointer;
  }
  #page1 .page-inner {
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .heart-icon-big {
    font-size: 100px;
    display: block;
    text-align: center;
    animation: heartPulse 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(74,144,217,0.8));
    margin-bottom: 30px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .heart-icon-big:active { transform: scale(0.9); }
  @keyframes heartPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .tap-hint {
    color: var(--blue-light);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
    font-family: 'Arial', sans-serif;
  }
  .gift-title {
    color: var(--white);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
    font-family: 'Georgia', serif;
  }

  /* ===== PAGE 2 - NOTE ===== */
  #page2 .page-inner { padding: 20px 16px; }
  .notebook-card {
    background: #fffef9;
    border-radius: 20px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    overflow: hidden;
    border: 1px solid rgba(200,220,255,0.4);
    animation: slideUp 0.5s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .notebook-header {
    background: linear-gradient(135deg, #b8d4f0, #d6eaff);
    padding: 18px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid rgba(74,144,217,0.2);
  }
  .notebook-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--blue-mid);
    font-family: 'Georgia', serif;
  }
  .btn-close {
    background: rgba(255,255,255,0.7);
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn-close:hover { background: rgba(255,255,255,1); }
  .notebook-lines {
    padding: 16px 20px 20px;
    background: repeating-linear-gradient(
      to bottom,
      transparent, transparent 27px,
      rgba(74,144,217,0.15) 27px, rgba(74,144,217,0.15) 28px
    );
    min-height: 200px;
    line-height: 28px;
  }
  .typewriter-text {
    font-family: 'Georgia', serif;
    font-size: 15px;
    color: #2d3748;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .cursor-blink {
    display: inline-block;
    width: 2px; height: 16px;
    background: var(--blue-accent);
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .notebook-footer {
    padding: 10px 20px 14px;
    display: flex;
    justify-content: flex-end;
    border-top: 1px solid rgba(74,144,217,0.15);
  }
  .btn-next {
    background: linear-gradient(135deg, #4a90d9, #1a6bb5);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(74,144,217,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(74,144,217,0.5);
  }

  /* ===== PAGE 3 - LONG LETTER ===== */
  #page3 .page-inner {
    padding: 20px 16px;
    height: 100%;
    justify-content: center;
  }
  .letter-card {
    background: #fffef9;
    border-radius: 20px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(200,220,255,0.4);
  }
  .letter-header {
    background: linear-gradient(135deg, #b8d4f0, #d6eaff);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    border-radius: 20px 20px 0 0;
  }
  .letter-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--blue-mid);
  }
  .letter-body {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
    background: repeating-linear-gradient(
      to bottom,
      transparent, transparent 27px,
      rgba(74,144,217,0.12) 27px, rgba(74,144,217,0.12) 28px
    );
    scroll-behavior: smooth;
  }
  .letter-body::-webkit-scrollbar { width: 4px; }
  .letter-body::-webkit-scrollbar-track { background: transparent; }
  .letter-body::-webkit-scrollbar-thumb { background: rgba(74,144,217,0.3); border-radius: 2px; }
  .letter-text {
    font-family: 'Georgia', serif;
    font-size: 14px;
    color: #2d3748;
    line-height: 28px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .letter-footer {
    padding: 12px 20px;
    display: flex;
    justify-content: flex-end;
    border-top: 1px solid rgba(74,144,217,0.15);
    flex-shrink: 0;
  }

  /* ===== PAGE 4 - WISHES ===== */
  #page4 .page-inner { padding: 20px 16px; }
  .wishes-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(214,234,255,0.9));
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px 24px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.6);
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }
  .wishes-header-icon {
    font-size: 50px;
    display: block;
    margin-bottom: 8px;
    animation: heartPulse 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 15px rgba(74,144,217,0.5));
  }
  .wishes-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue-mid);
    margin-bottom: 16px;
    font-family: 'Georgia', serif;
  }
  .wishes-divider {
    height: 2px;
    background: linear-gradient(to right, transparent, var(--blue-accent), transparent);
    margin: 0 20px 20px;
    border-radius: 1px;
  }
  .wishes-message {
    font-family: 'Georgia', serif;
    font-size: 15px;
    color: #3a4a6b;
    line-height: 1.8;
    padding: 0 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .wishes-footer { margin-top: 24px; }

  /* Floating hearts for page 4 */
  .floating-heart {
    position: absolute;
    font-size: 16px;
    animation: floatHeart 3s ease-in infinite;
    opacity: 0;
    pointer-events: none;
  }
  @keyframes floatHeart {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(-120px) rotate(20deg); opacity: 0; }
  }

  /* ===== PAGE 5 - MOMENTS ===== */
  #page5 .page-inner { padding: 16px 16px; height: 100%; justify-content: center; }
  .moments-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    width: 100%;
  }
  .moments-header {
    background: linear-gradient(135deg, #b8d4f0, #d6eaff);
    padding: 16px 20px;
    text-align: center;
  }
  .moments-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue-mid);
    font-family: 'Georgia', serif;
  }
  .photo-slider {
    position: relative;
    background: #0a1628;
    aspect-ratio: 1/1;
    overflow: hidden;
  }
  .photo-slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    transform: translateX(50px);
  }
  .photo-slide.active {
    opacity: 1;
    transform: translateX(0);
  }
  .photo-slide.exit-left {
    opacity: 0;
    transform: translateX(-50px);
  }
  .photo-slide img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .photo-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a3a6b, #0a1628);
    color: var(--blue-light);
    gap: 12px;
  }
  .photo-placeholder span { font-size: 50px; }
  .photo-placeholder p { font-size: 14px; opacity: 0.6; }
  .slider-controls {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fffef9;
  }
  .btn-slider {
    background: linear-gradient(135deg, #b8d4f0, #4a90d9);
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    color: white;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-slider:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(74,144,217,0.4); }
  .slider-dots {
    display: flex; gap: 8px; align-items: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(74,144,217,0.3);
    cursor: pointer;
    transition: all 0.3s;
  }
  .dot.active {
    background: var(--blue-accent);
    transform: scale(1.3);
  }
  .photo-caption {
    padding: 10px 20px 14px;
    text-align: center;
    font-family: 'Georgia', serif;
    font-size: 14px;
    font-style: italic;
    color: #4a5568;
    background: #fffef9;
    border-top: 1px solid rgba(74,144,217,0.1);
    min-height: 48px;
  }

  /* ===== MUSIC BUTTON ===== */
  #musicBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: white;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  #musicBtn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
  #musicBtn.playing { animation: musicPulse 1s ease-in-out infinite; }
  @keyframes musicPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(74,144,217,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(74,144,217,0); }
  }

  /* ===== SETTINGS BUTTON ===== */
  #settingsBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: white;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  #settingsBtn:hover { background: rgba(255,255,255,0.25); transform: rotate(45deg) scale(1.1); }

  /* ===== EDITOR SIDEBAR ===== */
  #editorSidebar {
    position: fixed;
    top: 0; right: -380px;
    width: 360px;
    height: 100%;
    z-index: 200;
    background: rgba(10,22,40,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(74,144,217,0.3);
    transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    padding: 0;
  }
  #editorSidebar.open { right: 0; }
  #editorSidebar::-webkit-scrollbar { width: 4px; }
  #editorSidebar::-webkit-scrollbar-track { background: transparent; }
  #editorSidebar::-webkit-scrollbar-thumb { background: rgba(74,144,217,0.4); border-radius: 2px; }
  .editor-header {
    background: linear-gradient(135deg, #1a3a6b, #0d2a55);
    padding: 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 1;
    border-bottom: 1px solid rgba(74,144,217,0.3);
  }
  .editor-header h3 { color: white; font-size: 16px; font-family: 'Georgia', serif; }
  .btn-close-editor {
    background: rgba(255,255,255,0.1);
    border: none; color: white;
    width: 30px; height: 30px;
    border-radius: 50%; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn-close-editor:hover { background: rgba(255,255,255,0.2); }
  .editor-body { padding: 16px; }
  .editor-section {
    margin-bottom: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid rgba(74,144,217,0.2);
  }
  .editor-section-title {
    color: var(--blue-light);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: 'Arial', sans-serif;
  }
  .editor-field { margin-bottom: 10px; }
  .editor-field label {
    display: block;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    margin-bottom: 4px;
    font-family: 'Arial', sans-serif;
  }
  .editor-field input,
  .editor-field textarea {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(74,144,217,0.3);
    border-radius: 8px;
    color: white;
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'Georgia', serif;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .editor-field input:focus,
  .editor-field textarea:focus {
    border-color: var(--blue-accent);
    background: rgba(74,144,217,0.1);
  }
  .editor-field textarea { min-height: 80px; }
  .btn-upload {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, rgba(74,144,217,0.3), rgba(26,107,181,0.3));
    border: 1px dashed rgba(74,144,217,0.5);
    border-radius: 8px;
    color: var(--blue-light);
    padding: 10px 14px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    font-family: 'Arial', sans-serif;
    justify-content: center;
    margin-bottom: 6px;
  }
  .btn-upload:hover {
    background: linear-gradient(135deg, rgba(74,144,217,0.4), rgba(26,107,181,0.4));
    border-color: var(--blue-accent);
  }
  .btn-apply {
    background: linear-gradient(135deg, #4a90d9, #1a6bb5);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    font-family: 'Georgia', serif;
    font-weight: 600;
    margin-top: 8px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(74,144,217,0.3);
  }
  .btn-apply:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,144,217,0.4); }

  /* Photo thumbnails in editor */
  .photo-thumbs {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .photo-thumb {
    position: relative;
    width: 60px; height: 60px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid rgba(74,144,217,0.3);
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .remove-photo {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.6);
    border: none; color: white;
    width: 18px; height: 18px;
    border-radius: 50%; font-size: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* ===== OVERLAY (backdrop for editor) ===== */
  #editorOverlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #editorOverlay.open { opacity: 1; pointer-events: all; }

  /* ===== TOAST NOTIFICATION ===== */
  #toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: linear-gradient(135deg, #4a90d9, #1a6bb5);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Arial', sans-serif;
    z-index: 300;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 4px 15px rgba(74,144,217,0.4);
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 440px) {
    #editorSidebar { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<!-- BOKEH BACKGROUND -->
<div class="bokeh-bg" id="bokehBg"></div>

<!-- APP -->
<div id="app">

  <!-- ===== PAGE 1: LANDING ===== -->
  <div class="page active" id="page1">
    <div class="page-inner">
      <span class="heart-icon-big" id="heartBtn">💙</span>
      <p class="tap-hint">tap to open</p>
      <h1 class="gift-title" id="giftTitle">A GIFT FOR YOU</h1>
    </div>
  </div>

  <!-- ===== PAGE 2: NOTE ===== -->
  <div class="page" id="page2">
    <div class="page-inner">
      <div class="card notebook-card">
        <div class="notebook-header">
          <span class="notebook-title" id="noteTitle">📝 Dear,</span>
          <button class="btn-close" onclick="goToPage(1)" title="Tutup">✕</button>
        </div>
        <div class="notebook-lines">
          <p class="typewriter-text" id="noteText"></p>
          <span class="cursor-blink" id="noteCursor"></span>
        </div>
        <div class="notebook-footer">
          <button class="btn-next" onclick="goToPage(3)">Baca Selengkapnya →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== PAGE 3: LONG LETTER ===== -->
  <div class="page" id="page3">
    <div class="page-inner">
      <div class="card letter-card">
        <div class="letter-header">
          <span class="letter-title">💌 Surat Untukmu</span>
          <button class="btn-close" onclick="goToPage(2)" title="Kembali">←</button>
        </div>
        <div class="letter-body" id="letterBody">
          <p class="letter-text" id="letterText"></p>
        </div>
        <div class="letter-footer">
          <button class="btn-next" onclick="goToPage(4)">Lanjutkan →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== PAGE 4: WISHES ===== -->
  <div class="page" id="page4">
    <div class="page-inner">
      <div class="wishes-card" id="wishesCard">
        <span class="wishes-header-icon">💙</span>
        <h2 class="wishes-title">Wishes For You</h2>
        <div class="wishes-divider"></div>
        <p class="wishes-message" id="wishesText"></p>
        <div class="wishes-footer">
          <button class="btn-next" onclick="goToPage(5)">Our Moments →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== PAGE 5: MOMENTS ===== -->
  <div class="page" id="page5">
    <div class="page-inner">
      <div class="moments-card">
        <div class="moments-header">
          <h2 class="moments-title">📸 Our Moments</h2>
        </div>
        <div class="photo-slider" id="photoSlider"></div>
        <div class="slider-controls">
          <button class="btn-slider" onclick="prevPhoto()">‹</button>
          <div class="slider-dots" id="sliderDots"></div>
          <button class="btn-slider" onclick="nextPhoto()">›</button>
        </div>
        <div class="photo-caption" id="photoCaption"></div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- MUSIC BUTTON -->
<button id="musicBtn" onclick="toggleMusic()" title="Musik">🎵</button>

<!-- SETTINGS BUTTON -->
<button id="settingsBtn" onclick="openEditor()" title="Edit">⚙️</button>

<!-- EDITOR OVERLAY -->
<div id="editorOverlay" onclick="closeEditor()"></div>

<!-- EDITOR SIDEBAR -->
<div id="editorSidebar">
  <div class="editor-header">
    <h3>✏️ Edit Konten</h3>
    <button class="btn-close-editor" onclick="closeEditor()">✕</button>
  </div>
  <div class="editor-body">

    <!-- GENERAL -->
    <div class="editor-section">
      <div class="editor-section-title">🌟 Umum</div>
      <div class="editor-field">
        <label>Nama Pasangan</label>
        <input type="text" id="ed_name" placeholder="Contoh: Sayang, Cintaku...">
      </div>
      <div class="editor-field">
        <label>Judul Halaman 1</label>
        <input type="text" id="ed_giftTitle" placeholder="A GIFT FOR YOU">
      </div>
    </div>

    <!-- PAGE 2 -->
    <div class="editor-section">
      <div class="editor-section-title">📝 Halaman 2 - Catatan</div>
      <div class="editor-field">
        <label>Judul Catatan</label>
        <input type="text" id="ed_noteTitle" placeholder="📝 Dear,">
      </div>
      <div class="editor-field">
        <label>Isi Catatan (typewriter)</label>
        <textarea id="ed_noteContent" rows="4" placeholder="Hai sayang..."></textarea>
      </div>
    </div>

    <!-- PAGE 3 -->
    <div class="editor-section">
      <div class="editor-section-title">💌 Halaman 3 - Surat Panjang</div>
      <div class="editor-field">
        <label>Isi Surat</label>
        <textarea id="ed_letterContent" rows="6" placeholder="Surat panjang..."></textarea>
      </div>
    </div>

    <!-- PAGE 4 -->
    <div class="editor-section">
      <div class="editor-section-title">💙 Halaman 4 - Wishes</div>
      <div class="editor-field">
        <label>Pesan Wishes</label>
        <textarea id="ed_wishesText" rows="4" placeholder="Semoga kamu selalu..."></textarea>
      </div>
    </div>

    <!-- PAGE 5 -->
    <div class="editor-section">
      <div class="editor-section-title">📸 Halaman 5 - Foto</div>
      <div class="editor-field">
        <label>Upload Foto (bisa banyak)</label>
        <label class="btn-upload" for="photoUpload">📷 Pilih Foto</label>
        <input type="file" id="photoUpload" accept="image/*" multiple style="display:none" onchange="handlePhotoUpload(event)">
        <div class="photo-thumbs" id="photoThumbs"></div>
      </div>
      <div id="captionFields"></div>
    </div>

    <!-- MUSIC -->
    <div class="editor-section">
      <div class="editor-section-title">🎵 Musik</div>
      <div class="editor-field">
        <label>Upload MP3</label>
        <label class="btn-upload" for="musicUpload">🎵 Pilih Musik</label>
        <input type="file" id="musicUpload" accept="audio/mp3,audio/mpeg" style="display:none" onchange="handleMusicUpload(event)">
        <p id="musicFileName" style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:4px;font-family:Arial,sans-serif;"></p>
      </div>
    </div>

    <button class="btn-apply" onclick="applyEditorChanges()">✨ Terapkan Perubahan</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop></audio>

<!-- TOAST -->
<div id="toast">✨ Tersimpan!</div>

<script>
// ===== DEFAULT DATA =====
const DEFAULT = {
  name: "Sayang",
  giftTitle: "A GIFT FOR YOU",
  noteTitle: "📝 Dear Sayang,",
  noteContent: "Hai, ada sesuatu yang ingin aku sampaikan untukmu hari ini...\n\nAku harap kamu tersenyum saat membaca ini. 💙",
  letterContent: `Untuk kamu yang selalu ada di hatiku,

Setiap hari bersamamu adalah hadiah yang tak ternilai. Aku ingin kamu tahu betapa beruntungnya aku memilikimu dalam hidupku.

Senyummu adalah cahaya di hari-hariku yang gelap. Tawamu adalah melodi terindah yang pernah kudengar. Dan kehadiranmu adalah alasan terbesar mengapa aku bersyukur setiap pagi.

Aku mungkin tidak sempurna, dan perjalanan kita mungkin tidak selalu mulus, tapi satu hal yang pasti: perasaanku untukmu tidak pernah goyah.

Terima kasih sudah menjadi dirimu sendiri. Terima kasih sudah memilihku. Terima kasih sudah ada.

Kamu adalah rumah bagiku. 🏠💙

Dengan sepenuh hati,
Seseorang yang menyayangimu ✨`,
  wishesText: `Semoga setiap hari dalam hidupmu dipenuhi dengan kebahagiaan yang tulus dan senyuman yang tak pernah pudar.

Semoga semua impianmu menjadi kenyataan, semua doamu dikabulkan, dan semua yang kamu cintai selalu dalam lindungan.

Kamu layak mendapatkan yang terbaik dari segalanya. 💙✨`,
  photos: [],
  captions: [],
  musicData: null,
  musicName: ""
};

// ===== STATE =====
let state = {};
let currentPage = 1;
let currentPhoto = 0;
let typewriterTimeout = null;
let isPlaying = false;
let photos = [];

// ===== INIT =====
function init() {
  loadFromStorage();
  createBokehDots();
  renderAll();
  startPage1Animations();
}

// ===== STORAGE =====
function loadFromStorage() {
  const saved = localStorage.getItem('romanticWebState');
  if (saved) {
    try { state = { ...DEFAULT, ...JSON.parse(saved) }; }
    catch(e) { state = { ...DEFAULT }; }
  } else {
    state = { ...DEFAULT };
  }
  photos = state.photos || [];
}

function saveToStorage() {
  try {
    const toSave = { ...state, photos, captions: state.captions || [] };
    localStorage.setItem('romanticWebState', JSON.stringify(toSave));
  } catch(e) {
    // Storage full (large photos), save without photos
    const toSave = { ...state };
    delete toSave.photos;
    delete toSave.musicData;
    localStorage.setItem('romanticWebState', JSON.stringify(toSave));
  }
}

// ===== RENDER ALL =====
function renderAll() {
  // Page 1
  document.getElementById('giftTitle').textContent = state.giftTitle || DEFAULT.giftTitle;

  // Page 2 title
  document.getElementById('noteTitle').textContent = state.noteTitle || DEFAULT.noteTitle;

  // Page 3 - set text
  document.getElementById('letterText').textContent = state.letterContent || DEFAULT.letterContent;

  // Page 4
  document.getElementById('wishesText').textContent = state.wishesText || DEFAULT.wishesText;

  // Page 5
  renderSlider();

  // Music
  if (state.musicData) {
    const audio = document.getElementById('bgMusic');
    audio.src = state.musicData;
    document.getElementById('musicFileName').textContent = state.musicName || '';
  }
}

// ===== BOKEH DOTS =====
function createBokehDots() {
  const bg = document.getElementById('bokehBg');
  const colors = ['#4a90d9','#1a6bb5','#b8d4f0','#2a5a9b'];
  for (let i = 0; i < 12; i++) {
    const dot = document.createElement('div');
    dot.className = 'bokeh-dot';
    const size = 40 + Math.random() * 120;
    dot.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      background:radial-gradient(circle, ${colors[i%colors.length]}, transparent);
      animation: bokehFloat ${4+Math.random()*6}s ease-in-out infinite alternate;
      animation-delay: ${-Math.random()*8}s;
    `;
    bg.appendChild(dot);
  }
}

// ===== PAGE NAVIGATION =====
function goToPage(num) {
  const currentEl = document.getElementById('page' + currentPage);
  const nextEl = document.getElementById('page' + num);
  if (!nextEl || currentPage === num) return;

  currentEl.classList.add('exit');
  setTimeout(() => {
    currentEl.classList.remove('active', 'exit');
  }, 600);

  setTimeout(() => {
    nextEl.classList.add('active');
    currentPage = num;
    onPageEnter(num);
  }, 300);
}

function onPageEnter(num) {
  if (num === 2) {
    startTypewriter();
  }
  if (num === 3) {
    autoScrollLetter();
  }
  if (num === 4) {
    startFloatingHearts();
  }
  if (num === 5) {
    renderSlider();
  }
}

// ===== PAGE 1 =====
function startPage1Animations() {
  document.getElementById('heartBtn').addEventListener('click', () => {
    goToPage(2);
  });
}

// ===== PAGE 2: TYPEWRITER =====
function startTypewriter() {
  const el = document.getElementById('noteText');
  const cursor = document.getElementById('noteCursor');
  const text = state.noteContent || DEFAULT.noteContent;
  el.textContent = '';
  cursor.style.display = 'inline-block';
  if (typewriterTimeout) clearTimeout(typewriterTimeout);

  let i = 0;
  function type() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      typewriterTimeout = setTimeout(type, 35);
    } else {
      cursor.style.display = 'none';
    }
  }
  setTimeout(type, 400);
}

// ===== PAGE 3: AUTO SCROLL =====
function autoScrollLetter() {
  const body = document.getElementById('letterBody');
  body.scrollTop = 0;
  setTimeout(() => {
    const totalScroll = body.scrollHeight - body.clientHeight;
    if (totalScroll <= 0) return;
    const duration = Math.max(4000, totalScroll * 12);
    const start = Date.now();
    function scroll() {
      const elapsed = Date.now() - start;
      const progress = Math.min(elapsed / duration, 1);
      const ease = progress < 0.5 ? 2*progress*progress : -1+(4-2*progress)*progress;
      body.scrollTop = ease * totalScroll;
      if (progress < 1) requestAnimationFrame(scroll);
    }
    requestAnimationFrame(scroll);
  }, 800);
}

// ===== PAGE 4: FLOATING HEARTS =====
let heartsInterval = null;
function startFloatingHearts() {
  const card = document.getElementById('wishesCard');
  if (heartsInterval) clearInterval(heartsInterval);
  heartsInterval = setInterval(() => {
    if (currentPage !== 4) { clearInterval(heartsInterval); return; }
    const heart = document.createElement('div');
    heart.className = 'floating-heart';
    heart.textContent = ['💙','💎','✨','💫','⭐'][Math.floor(Math.random()*5)];
    heart.style.left = (10 + Math.random() * 80) + '%';
    heart.style.bottom = '10%';
    heart.style.animationDuration = (2 + Math.random() * 2) + 's';
    heart.style.animationDelay = '0s';
    card.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
  }, 600);
}

// ===== PAGE 5: SLIDER =====
function renderSlider() {
  const slider = document.getElementById('photoSlider');
  const dotsEl = document.getElementById('sliderDots');
  const caption = document.getElementById('photoCaption');

  slider.innerHTML = '';
  dotsEl.innerHTML = '';

  const photoList = photos.length > 0 ? photos : [null];
  const captions = state.captions || [];

  photoList.forEach((photo, i) => {
    const slide = document.createElement('div');
    slide.className = 'photo-slide' + (i === currentPhoto ? ' active' : '');
    slide.id = 'slide_' + i;

    if (photo) {
      const img = document.createElement('img');
      img.src = photo;
      img.alt = 'Moment ' + (i+1);
      slide.appendChild(img);
    } else {
      slide.innerHTML = `<div class="photo-placeholder"><span>📷</span><p>Upload foto di editor ⚙️</p></div>`;
    }
    slider.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentPhoto ? ' active' : '');
    dot.onclick = () => goToPhoto(i);
    dotsEl.appendChild(dot);
  });

  caption.textContent = captions[currentPhoto] || (photos[currentPhoto] ? '✨ Moment ' + (currentPhoto+1) : '');
}

function goToPhoto(num) {
  const prev = document.getElementById('slide_' + currentPhoto);
  if (prev) prev.classList.add('exit-left');
  setTimeout(() => { if (prev) { prev.classList.remove('active','exit-left'); } }, 500);

  const total = Math.max(photos.length, 1);
  currentPhoto = (num + total) % total;

  const next = document.getElementById('slide_' + currentPhoto);
  setTimeout(() => {
    if (next) next.classList.add('active');
    // update dots
    document.querySelectorAll('#sliderDots .dot').forEach((d,i) => d.classList.toggle('active', i===currentPhoto));
    // update caption
    const captions = state.captions || [];
    document.getElementById('photoCaption').textContent = captions[currentPhoto] || (photos[currentPhoto] ? '✨ Moment ' + (currentPhoto+1) : '');
  }, 100);
}

function nextPhoto() { goToPhoto(currentPhoto + 1); }
function prevPhoto() { goToPhoto(currentPhoto - 1); }

// ===== MUSIC =====
function toggleMusic() {
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  if (!audio.src || audio.src === window.location.href) {
    showToast('Upload musik dulu di editor ⚙️');
    return;
  }
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    btn.textContent = '🎵';
    btn.classList.remove('playing');
  } else {
    audio.play().then(() => {
      isPlaying = true;
      btn.textContent = '🎶';
      btn.classList.add('playing');
    }).catch(() => showToast('Ketuk layar dulu lalu tekan musik'));
  }
}

// ===== EDITOR =====
function openEditor() {
  // Populate editor fields
  document.getElementById('ed_name').value = state.name || DEFAULT.name;
  document.getElementById('ed_giftTitle').value = state.giftTitle || DEFAULT.giftTitle;
  document.getElementById('ed_noteTitle').value = state.noteTitle || DEFAULT.noteTitle;
  document.getElementById('ed_noteContent').value = state.noteContent || DEFAULT.noteContent;
  document.getElementById('ed_letterContent').value = state.letterContent || DEFAULT.letterContent;
  document.getElementById('ed_wishesText').value = state.wishesText || DEFAULT.wishesText;
  document.getElementById('musicFileName').textContent = state.musicName || '';

  renderEditorThumbs();
  renderCaptionFields();

  document.getElementById('editorSidebar').classList.add('open');
  document.getElementById('editorOverlay').classList.add('open');
}

function closeEditor() {
  document.getElementById('editorSidebar').classList.remove('open');
  document.getElementById('editorOverlay').classList.remove('open');
}

function renderEditorThumbs() {
  const thumbsEl = document.getElementById('photoThumbs');
  thumbsEl.innerHTML = '';
  photos.forEach((photo, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'photo-thumb';
    thumb.innerHTML = `
      <img src="${photo}" alt="">
      <button class="remove-photo" onclick="removePhoto(${i})">✕</button>
    `;
    thumbsEl.appendChild(thumb);
  });
}

function renderCaptionFields() {
  const el = document.getElementById('captionFields');
  el.innerHTML = '';
  if (photos.length === 0) {
    el.innerHTML = '<p style="color:rgba(255,255,255,0.4);font-size:12px;font-family:Arial,sans-serif;">Upload foto untuk mengatur caption</p>';
    return;
  }
  photos.forEach((_, i) => {
    const captions = state.captions || [];
    el.innerHTML += `
      <div class="editor-field">
        <label>Caption Foto ${i+1}</label>
        <input type="text" id="caption_${i}" value="${(captions[i]||'').replace(/"/g,'&quot;')}" placeholder="Caption foto ${i+1}...">
      </div>
    `;
  });
}

function removePhoto(idx) {
  photos.splice(idx, 1);
  if (state.captions) state.captions.splice(idx, 1);
  if (currentPhoto >= photos.length) currentPhoto = Math.max(0, photos.length - 1);
  renderEditorThumbs();
  renderCaptionFields();
}

function handlePhotoUpload(event) {
  const files = Array.from(event.target.files);
  if (files.length === 0) return;

  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      photos.push(e.target.result);
      loaded++;
      if (loaded === files.length) {
        renderEditorThumbs();
        renderCaptionFields();
        showToast(`${files.length} foto ditambahkan!`);
      }
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function handleMusicUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    state.musicData = e.target.result;
    state.musicName = file.name;
    document.getElementById('musicFileName').textContent = '🎵 ' + file.name;
    const audio = document.getElementById('bgMusic');
    audio.src = state.musicData;
    showToast('Musik berhasil diupload!');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function applyEditorChanges() {
  const name = document.getElementById('ed_name').value.trim();
  state.name = name || DEFAULT.name;
  state.giftTitle = document.getElementById('ed_giftTitle').value.trim() || DEFAULT.giftTitle;
  state.noteTitle = document.getElementById('ed_noteTitle').value.trim() || DEFAULT.noteTitle;
  state.noteContent = document.getElementById('ed_noteContent').value || DEFAULT.noteContent;
  state.letterContent = document.getElementById('ed_letterContent').value || DEFAULT.letterContent;
  state.wishesText = document.getElementById('ed_wishesText').value || DEFAULT.wishesText;

  // Collect captions
  const captions = [];
  photos.forEach((_, i) => {
    const capEl = document.getElementById('caption_' + i);
    captions.push(capEl ? capEl.value : '');
  });
  state.captions = captions;
  state.photos = photos;

  saveToStorage();
  renderAll();
  closeEditor();
  showToast('✨ Perubahan tersimpan!');
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== START =====
init();
</script>
</body>
</html>
